name: Build

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled, unlabeled]

jobs:
  build:
    uses: datasworn-community/.github/.github/workflows/build.yml@v1

  release-policy:
    name: Release policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check release policy
        id: release-policy
        continue-on-error: true
        env:
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
          RELEASE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          RELEASE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bun ./scripts/releasePlan.ts check-pr

      - name: Comment on release policy failure
        if: steps.release-policy.outcome == 'failure' && steps.release-policy.outputs.comment_body != ''
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          COMMENT_BODY: ${{ steps.release-policy.outputs.comment_body }}
        with:
          script: |
            const marker = '<!-- datasworn-release-policy -->'
            const body = `${marker}\n\n${process.env.COMMENT_BODY}`
            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            })
            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.startsWith(marker)
            )
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              })
            }

      - name: Summarize release policy failure
        if: steps.release-policy.outcome == 'failure' && steps.release-policy.outputs.comment_body != ''
        env:
          COMMENT_BODY: ${{ steps.release-policy.outputs.comment_body }}
        run: |
          {
            echo "$COMMENT_BODY"
            echo
            echo "> If the PR comment step could not write to GitHub, this summary is the fallback."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail release policy
        if: steps.release-policy.outcome == 'failure'
        run: exit 1
