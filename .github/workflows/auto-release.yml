name: Auto Release

on:
  push:
    branches: [main]

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  release:
    name: Plan, tag, and release
    if: ${{ !startsWith(github.event.head_commit.message, 'chore: release v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Plan release
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BASE_SHA: ${{ github.event.before }}
          RELEASE_HEAD_SHA: ${{ github.sha }}
        run: bun ./scripts/releasePlan.ts plan-main

      - name: Build
        if: steps.plan.outputs.release == 'true'
        run: bun run build

      - name: Validate
        if: steps.plan.outputs.release == 'true'
        run: bun run validate

      - name: Configure Git
        if: steps.plan.outputs.release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        if: steps.plan.outputs.release == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bunx release-it "${{ steps.plan.outputs.version }}" --ci
